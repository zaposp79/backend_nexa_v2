          additionalProperties: true
          title: Diff
          type: object
        matches_baseline:
          title: Matches Baseline
          type: boolean
      required:
      - baseline_id
      - matches_baseline
      title: AuditBaselineComparisonV1
      type: object
    AuditFormulaV1:
      additionalProperties: false
      description: One unique formula recorded by a calculator during the simulation.
      properties:
        calculator:
          title: Calculator
          type: string
        formula:
          title: Formula
          type: string
        stage:
          title: Stage
          type: string

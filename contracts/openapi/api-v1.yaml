      required:
      - file
      title: Body_upload_op_api_v1_parametrization_op_upload_post
      type: object
    CalculationRequest:
      description: "Cuerpo de la solicitud de cálculo.\n\n`user_input` soporta dos\
        \ formatos:\n\n**Formato legacy (test_cases):**\n  - panel_de_control, condiciones_cadena_a/b/c\n\
        \n**Formato entry_data:**\n  - datos_operativos, polizas, reglas_negocio,\
        \ volumetria,\n    condiciones_cadena_a/b/c (se normaliza automáticamente)\n\
        \n**Auto-envuelto (flat body):**\nSi el body llega SIN la clave ``user_input``\
        \ (e.g. el cliente envía el\npayload directamente como raíz del JSON), el\
        \ validador lo detecta y lo\nenvuelve automáticamente en ``{\"user_input\"\
        : <body>}``.  Esto evita el\n422 cuando el cliente envía un body plano."
      properties:
        user_input:
          additionalProperties: true
          title: User Input
          type: object
      required:
      - user_input
      title: CalculationRequest
      type: object
    CertificateVerificationResultV1:

          default: 1
          minimum: 1.0
          title: Used Count
          type: integer
      required:
      - calculator
      - formula
      - stage
      title: AuditFormulaV1
      type: object
    AuditLineageSummaryV1:
      additionalProperties: false
      description: Compact summary of the lineage graph.
      properties:
        nodes_count:
          default: 0
          minimum: 0.0
          title: Nodes Count
          type: integer
        roots:
          items:
            type: string
          title: Roots
          type: array
        stages_summary:
          additionalProperties:
            type: integer
          title: Stages Summary
          type: object
      title: AuditLineageSummaryV1
      type: object
    AuditParametersUsedV1:
      additionalProperties: false
      description: 'Split of inputs consumed by the simulation: request vs parametrization.'
      properties:
        excel_refs:
          items:
            $ref: '#/components/schemas/LineageRefV1'
          title: Excel Refs
          type: array
        parametrization:
          additionalProperties: true
          title: Parametrization
          type: object
        request:
          additionalProperties: true
          title: Request
          type: object
      title: AuditParametersUsedV1
      type: object
    AuditResponseV1:
      additionalProperties: false
      description: "Audit envelope for one simulation.\n\nF9 placeholders:\n    engine_version:\
        \        literal until WAVE 14 wires the real SemVer.\n    formula_set:  \
        \         literal until WAVE 14 wires the manifest hash.\n    parametrization_hashes:\
        \ empty dict today; WAVE 14 will populate."
      properties:
        api_version:
          const: api-v1
          default: api-v1
          title: Api Version
          type: string
        baseline_comparison:
          anyOf:
          - $ref: '#/components/schemas/AuditBaselineComparisonV1'
          - type: 'null'
        engine_version:
          default: engine-v2
          title: Engine Version
          type: string
        formula_set:
          default: formula-set-v2-7
          title: Formula Set
          type: string
        formulas:
          items:
            $ref: '#/components/schemas/AuditFormulaV1'
          title: Formulas
          type: array
        generated_at:
          format: date-time
          title: Generated At
          type: string
        lineage:
          $ref: '#/components/schemas/AuditLineageSummaryV1'
        parameters_used:
          $ref: '#/components/schemas/AuditParametersUsedV1'
        parametrization_hashes:
          additionalProperties:
            type: string
          title: Parametrization Hashes
          type: object
        simulation_id:
          title: Simulation Id
          type: string
      required:
      - simulation_id
      - lineage
      title: AuditResponseV1
      type: object
    AuditSimulationSummaryV1:
      additionalProperties: false
      description: Compact summary for the listing endpoint.
      properties:
        generated_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Generated At
        nodes_count:
          default: 0
          minimum: 0.0
          title: Nodes Count
          type: integer
        roots_count:
          default: 0
          minimum: 0.0
          title: Roots Count
          type: integer
        simulation_id:
          title: Simulation Id
          type: string
        stages:
          items:
            type: string
          title: Stages
          type: array
      required:
      - simulation_id
      title: AuditSimulationSummaryV1
      type: object
    AuditValueExplanationV1:
      additionalProperties: false

info:
  description: Motor de pricing + API de parametrización y simulación
  title: NEXA Simulator API
  version: 1.0.0
  x-contract-version: api-v1
openapi: 3.1.0
paths:
  /api/v1/audit/simulation/{simulation_id}:
    get:
      description: 'Return the audit envelope for `simulation_id`.


        Returns 404 if the simulation was not run with `with_lineage=True`.'
      operationId: get_simulation_audit_api_v1_audit_simulation__simulation_id__get
      parameters:
      - in: path
        name: simulation_id
        required: true
        schema:
          title: Simulation Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditResponseV1'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Full audit envelope for a simulation.
      tags:
      - audit
  /api/v1/audit/simulation/{simulation_id}/baseline-diff:
    get:
      description: Compare KPIs from the persisted lineage vs the baseline's kpis.json.
      operationId: diff_vs_baseline_api_v1_audit_simulation__simulation_id__baseline_diff_get
      parameters:
      - in: path
        name: simulation_id
        required: true
        schema:
          title: Simulation Id
          type: string
      - description: Certified baseline id.
        in: query
        name: baseline_id
        required: true
        schema:
          description: Certified baseline id.
          title: Baseline Id
          type: string
      - description: Baseline collection version under storage/baselines/.
        in: query
        name: baseline_version
        required: false
        schema:
          default: v2-7-certified
          description: Baseline collection version under storage/baselines/.
          title: Baseline Version
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditBaselineComparisonV1'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Compare a simulation's kpis vs a certified baseline.
      tags:
      - audit
  /api/v1/audit/simulation/{simulation_id}/explain:
    get:
      description: Return the trace_back chain + human explanation for `value_name`.
      operationId: explain_value_api_v1_audit_simulation__simulation_id__explain_get
      parameters:
      - in: path
        name: simulation_id
        required: true
        schema:
          title: Simulation Id
          type: string
      - description: Canonical value name in the lineage graph.
        in: query
        name: value_name
        required: true
        schema:
          description: Canonical value name in the lineage graph.
          title: Value Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditValueExplanationV1'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Lineage chain for a specific value in a simulation.
      tags:
      - audit
  /api/v1/audit/simulations:
    get:
      description: Return summaries of simulations that have a stored lineage graph.
      operationId: list_audit_simulations_api_v1_audit_simulations_get
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 500
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/AuditSimulationSummaryV1'
                title: Response List Audit Simulations Api V1 Audit Simulations Get
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List simulations with persisted lineage.
      tags:
      - audit
  /api/v1/certification/certificate/{certificate_id}:
    get:
      operationId: get_certificate_api_v1_certification_certificate__certificate_id__get
      parameters:
      - in: path
        name: certificate_id
        required: true
        schema:
          title: Certificate Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionCertificateV1'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Certificate
      tags:
      - certification
  /api/v1/certification/certificates:
    get:
      description: List most recent certificates (descending by mtime).
      operationId: list_certificates_api_v1_certification_certificates_get
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ExecutionCertificateV1'
                title: Response List Certificates Api V1 Certification Certificates
                  Get
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Certificates
      tags:
      - certification
  /api/v1/certification/verify/{certificate_id}:
    post:
      description: Re-validate ``certificate_id`` against the live parametrization
        hashes.
      operationId: verify_certificate_api_v1_certification_verify__certificate_id__post
      parameters:
      - in: path
        name: certificate_id
        required: true
        schema:
          title: Certificate Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateVerificationResultV1'
          description: Successful Response
        '404':
          description: Certificate not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Verify Certificate
      tags:
      - certification

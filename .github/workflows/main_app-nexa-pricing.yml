# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - app-nexa-pricing

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # App Service name. Override via repo variable AZURE_WEBAPP_NAME if needed.
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || 'app-nexa-pricing' }}
  PYTHON_VERSION: "3.12"

# OIDC requires id-token:write; contents:read for checkout.
permissions:
  id-token: write
  contents: read

# Prevent concurrent deploys to the same environment.
concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build & validate: early dependency check.
  # Checks out into a backend_nexa_v2/ subdirectory so that PYTHONPATH can be
  # set to $GITHUB_WORKSPACE and `import backend_nexa_v2` resolves correctly.
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & test (config & security gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: backend_nexa_v2

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend_nexa_v2/requirements.txt
            backend_nexa_v2/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend_nexa_v2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run config & security gate
        env:
          APP_ENV: test
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest \
            backend_nexa_v2/tests/api/test_sec_p0_2_env_consistency.py \
            backend_nexa_v2/tests/api/test_sec_p0_1_production_hardening.py \
            backend_nexa_v2/tests/api/test_app_factory.py \
            --tb=short

  # ---------------------------------------------------------------------------
  # Deploy: builds the nested layout and publishes via OIDC.
  #
  # Why nested? app.py uses relative imports (from .modules…, from .db…), which
  # only work when imported as `backend_nexa_v2.app`. That requires a
  # backend_nexa_v2/ directory with its parent in PYTHONPATH.
  #
  #   deploy_pkg/
  #     requirements.txt      ← Oryx detects Python here and builds antenv/
  #     backend_nexa_v2/      ← importable package (app.py, modules/, db/, …)
  #
  # run_api.sh auto-discovers its own directory, sets PROJECT_ROOT to the parent
  # of backend_nexa_v2/ and PYTHONPATH accordingly. Works whether Oryx extracts
  # the app to /tmp/<guid>/ or uses wwwroot directly.
  #
  # --clean wipes wwwroot before deploying, removing the stale output.tar.zst
  # that Oryx caches across deployments. Without --clean, Oryx extracts the old
  # tarball at startup instead of the freshly deployed files.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Azure Web App
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment package (nested layout)
        run: |
          mkdir -p deploy_pkg/backend_nexa_v2
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='storage' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='deploy_pkg' \
            --exclude='backend_nexa_archive' \
            ./ deploy_pkg/backend_nexa_v2/
          # requirements.txt at root so Oryx detects Python and builds antenv/
          cp requirements.txt deploy_pkg/requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E84F0BB0496F4115967F1230CC306588 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DB27FC9461254FF194E5E3AE633184EF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C6D6F4F9A07846CD9BD6280315D24BB2 }}

      - name: Configure and deploy to Azure Web App
        run: |
          RG=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup | [0]" -o tsv)
          echo "Resource group: $RG"

          # Enable Oryx to install packages from requirements.txt after deployment
          az webapp config appsettings set \
            --name '${{ env.AZURE_WEBAPP_NAME }}' \
            --resource-group "$RG" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

          # Set startup command: run_api.sh auto-discovers PROJECT_ROOT (parent of
          # backend_nexa_v2/) and sets PYTHONPATH correctly for `import backend_nexa_v2`.
          az webapp config set \
            --name '${{ env.AZURE_WEBAPP_NAME }}' \
            --resource-group "$RG" \
            --startup-file 'bash backend_nexa_v2/run_api.sh'

          # Ensure app is running so SCM/Kudu endpoint is available (avoids 403 Site Disabled)
          az webapp start --name '${{ env.AZURE_WEBAPP_NAME }}' --resource-group "$RG"
          sleep 20

          # Zip and deploy with --clean to wipe wwwroot (removes stale output.tar.zst).
          # --async: no polling on startup (avoids 10-min wait if app crashes);
          # the diagnostic step below captures the actual startup logs instead.
          cd deploy_pkg && zip -r /tmp/deploy.zip .
          az webapp deploy \
            --name '${{ env.AZURE_WEBAPP_NAME }}' \
            --resource-group "$RG" \
            --src-path /tmp/deploy.zip \
            --type zip \
            --clean true \
            --async true

      - name: Diagnóstico de arranque (no bloqueante)
        if: always()
        run: |
          set +e
          APP="${{ env.AZURE_WEBAPP_NAME }}"
          RG=$(az webapp list --query "[?name=='${APP}'].resourceGroup | [0]" -o tsv)
          HOST=$(az webapp show -n "$APP" -g "$RG" --query defaultHostName -o tsv)
          STATE=$(az webapp show -n "$APP" -g "$RG" --query state -o tsv)
          echo "Estado: $STATE  |  Hostname: $HOST"

          # With --async deploy, Oryx still needs time to build + start the app.
          echo "=== /health (espera 120s: Oryx build + cold start) ==="
          sleep 120
          curl -sS -m 30 -w "\nHTTP %{http_code}\n" "https://$HOST/health" || true

          echo "=== Logs del contenedor (Oryx + uvicorn) ==="
          az webapp log config -n "$APP" -g "$RG" --docker-container-logging filesystem >/dev/null 2>&1
          az webapp log download -n "$APP" -g "$RG" --log-file /tmp/applogs.zip >/dev/null 2>&1
          if [ -f /tmp/applogs.zip ]; then
            mkdir -p /tmp/applogs && unzip -o -q /tmp/applogs.zip -d /tmp/applogs
            echo "--- últimas 300 líneas de docker logs ---"
            find /tmp/applogs -iname '*docker*.log' -exec cat {} + 2>/dev/null | tail -n 300
          else
            echo "(no se pudo descargar el bundle de logs)"
          fi
          exit 0

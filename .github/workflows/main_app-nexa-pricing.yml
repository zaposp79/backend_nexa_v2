# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - app-nexa-pricing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Guard: fail the build immediately if the critical import path is wrong.
      - name: Verify app.py has correct import paths
        run: |
          echo "=== app.py lines 88-95 ==="
          sed -n '88,95p' app.py
          if grep -q 'shared\.infrastructure\.' app.py; then
            echo "FATAL: app.py still references the old 'infrastructure' module path!"
            exit 1
          fi
          echo "OK: import paths are correct."

      # Build the virtualenv that Azure will use at runtime.
      # Named 'antenv' because Oryx automatically detects and activates it.
      - name: Build Python virtualenv (antenv)
        run: |
          python -m venv antenv
          ./antenv/bin/pip install --upgrade pip --quiet
          ./antenv/bin/pip install -r requirements.txt --quiet
          echo "=== Packages installed (last 20) ==="
          ./antenv/bin/pip list --format=columns | tail -20

      - name: Assemble deployment zip
        # Creates app.zip with the source package (backend_nexa_v2/) and the
        # pre-built virtualenv (antenv/) at the top level.  The deploy job uses
        # 'az webapp deploy --clean' which wipes the old Oryx-generated
        # output.tar.zst and oryx-manifest.toml before extracting this zip.
        # Without those two Oryx files, Oryx startup runs from /home/site/wwwroot/
        # directly, so the absolute-path startup command below works correctly.
        run: |
          mkdir -p artifact/backend_nexa_v2
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='antenv' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='storage' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='artifact' \
            ./ artifact/backend_nexa_v2/

          cp -r antenv/ artifact/
          cp requirements.txt artifact/
          cp startup.sh artifact/

          echo "=== Verify artifact/backend_nexa_v2/app.py lines 88-95 ==="
          sed -n '88,95p' artifact/backend_nexa_v2/app.py

          cd artifact
          zip -r ../app.zip .
          cd ..
          echo "=== app.zip size: $(du -sh app.zip | cut -f1) ==="

      - name: Upload app.zip for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download app.zip
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A14CF1FA3A9D48AE904FE60EF2165C04 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0FA7C3E950074591BD038FEFD8F17A95 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_412BB608E0D342FA8EBCEB4FD50D2EE9 }}

      # az webapp show --name <n> (without --resource-group) fails silently in
      # command-substitution even with set -e.  Use 'az webapp list' instead,
      # which performs a subscription-wide search using the OIDC token.
      - name: Resolve resource group
        run: |
          RG=$(az webapp list \
            --query "[?name=='app-nexa-pricing'].resourceGroup | [0]" \
            -o tsv 2>/dev/null || true)
          if [ -z "$RG" ]; then
            echo "ERROR: 'app-nexa-pricing' not found via az webapp list."
            echo "Available webapps:"
            az webapp list --query "[].{name:name,rg:resourceGroup}" -o table || true
            exit 1
          fi
          echo "AZURE_RG=$RG" >> "$GITHUB_ENV"
          echo "Resource group: $RG"

      # Prevent Oryx from running a new build during deployment.
      # Without this, Oryx may rebuild from an incomplete wwwroot state
      # (race condition) and create a new stale tarball.
      - name: Disable Oryx build during deployment
        run: |
          az webapp config appsettings set \
            --name app-nexa-pricing \
            --resource-group "$AZURE_RG" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false \
            --output none
          echo "SCM_DO_BUILD_DURING_DEPLOYMENT=false"

      # Deploy with --clean: removes ALL existing files from /home/site/wwwroot/
      # before extracting our zip.  This deletes the stale output.tar.zst and
      # oryx-manifest.toml that Oryx has been reusing across every deployment.
      # After this step wwwroot contains only our backend_nexa_v2/ and antenv/.
      - name: Deploy zip to Azure (clean wwwroot)
        run: |
          az webapp deploy \
            --name app-nexa-pricing \
            --resource-group "$AZURE_RG" \
            --type zip \
            --src-path app.zip \
            --clean true \
            --async false
          echo "Deployment complete"

      # Set the startup command AFTER the zip deploy so it is not overwritten.
      # We use absolute /home/site/wwwroot/ paths so the command works whether
      # Oryx extracts a tarball to /tmp/<guid>/ or runs directly from wwwroot.
      - name: Set startup command
        run: |
          az webapp config set \
            --name app-nexa-pricing \
            --resource-group "$AZURE_RG" \
            --startup-file 'cd /home/site/wwwroot && export PYTHONPATH="/home/site/wwwroot:/home/site/wwwroot/antenv/lib/python3.12/site-packages:${PYTHONPATH:-}" && exec python -m uvicorn backend_nexa_v2.app:create_app --factory --host 0.0.0.0 --port "${PORT:-${WEBSITES_PORT:-8000}}" --workers "${WEB_CONCURRENCY:-2}" --no-access-log' \
            --output none
          echo "Startup command updated"

      - name: Restart app
        run: |
          az webapp restart --name app-nexa-pricing --resource-group "$AZURE_RG"
          echo "App restarted — check logs in ~30s"

# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - app-nexa-pricing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Early validation: catch dependency issues before deployment
      - name: Validate dependencies install cleanly
        run: |
          python -m venv .venv-check
          source .venv-check/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Required layout for `backend_nexa_v2.app:create_app` to be importable on Azure:
      #
      #   /home/site/wwwroot/
      #   ├── requirements.txt       ← Oryx reads this and runs pip install → antenv/
      #   ├── runtime.txt            ← Python version hint for Oryx
      #   └── backend_nexa_v2/      ← Python package; importable because PYTHONPATH=$(pwd)
      #
      # Oryx (SCM_DO_BUILD_DURING_DEPLOYMENT=true) installs packages from requirements.txt,
      # creates antenv/, then activates it before running the appCommandLine.
      # With PYTHONPATH=/home/site/wwwroot, `import backend_nexa_v2` resolves correctly.
      - name: Create deployment package
        run: |
          mkdir -p deploy/backend_nexa_v2
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='antenv/' \
            --exclude='venv/' \
            --exclude='.venv-check/' \
            --exclude='deploy/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='storage/' \
            . deploy/backend_nexa_v2/
          cp requirements.txt deploy/requirements.txt
          cp runtime.txt deploy/runtime.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E84F0BB0496F4115967F1230CC306588 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DB27FC9461254FF194E5E3AE633184EF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C6D6F4F9A07846CD9BD6280315D24BB2 }}

      - name: Prepare App Service for deployment
        run: |
          RG=$(az webapp list --query "[?name=='app-nexa-pricing'].resourceGroup | [0]" -o tsv)
          echo "Resource group: $RG"
          # Enable Oryx so it builds antenv from requirements.txt after deployment
          az webapp config appsettings set \
            --name 'app-nexa-pricing' \
            --resource-group "$RG" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true
          # Start app so SCM/Kudu endpoint is available for OneDeploy (avoids 403 Site Disabled)
          az webapp start --name 'app-nexa-pricing' --resource-group "$RG"
          sleep 30

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'app-nexa-pricing'
          slot-name: 'Production'
          package: .

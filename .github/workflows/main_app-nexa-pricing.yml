# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - app-nexa-pricing

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # App Service name. Override via repo variable AZURE_WEBAPP_NAME if needed.
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || 'app-nexa-pricing' }}
  PYTHON_VERSION: "3.12"

# OIDC requires id-token:write; contents:read for checkout.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Gate de calidad (deploy): el código importa 'backend_nexa_v2', por lo que el
  # checkout vive en un directorio LLAMADO backend_nexa_v2 con su padre en
  # PYTHONPATH (convención CLAUDE.md: PYTHONPATH=<parent> pytest backend_nexa_v2/tests).
  #
  # Gate DELIBERADAMENTE mínimo y sin parametrización: valida el hardening de
  # config/seguridad de producción. NO ejecuta parity/baseline porque esos
  # leen storage/ en disco — incompatible con la arquitectura "solo Cosmos".
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & test (config & security gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: backend_nexa_v2

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend_nexa_v2/requirements.txt
            backend_nexa_v2/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend_nexa_v2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run config & security gate
        env:
          APP_ENV: test
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest \
            backend_nexa_v2/tests/api/test_sec_p0_2_env_consistency.py \
            backend_nexa_v2/tests/api/test_sec_p0_1_production_hardening.py \
            backend_nexa_v2/tests/api/test_app_factory.py \
            --tb=short

  # ---------------------------------------------------------------------------
  # Deploy: empaqueta en layout ANIDADO y publica vía OIDC.
  #
  # ¿Por qué anidado? app.py usa imports relativos (from .modules…, from .db…),
  # que SOLO funcionan si el módulo se importa como `backend_nexa_v2.app`. Eso
  # exige un directorio backend_nexa_v2/ con su padre en PYTHONPATH.
  #
  #   deploy_pkg/
  #     requirements.txt      ← Oryx detecta Python aquí y construye antenv/
  #     backend_nexa_v2/      ← paquete importable (app.py, modules/, db/, …)
  #
  # run_api.sh fija PYTHONPATH=<raíz> y arranca `python -m backend_nexa_v2.app`.
  #
  # Se usa azure/webapps-deploy@v3 (Kudu zipdeploy) en lugar de az webapp deploy
  # (OneDeploy) porque Kudu integra correctamente con Oryx: activa antenv ANTES
  # de ejecutar el startup-command y reescribe el tarball en cada deploy (no hay
  # problema de tarball stale). Con OneDeploy el startup-command no pasa por el
  # wrapper de Oryx y la integración de antenv es inconsistente.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Azure Web App
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment package (nested layout)
        run: |
          mkdir -p deploy_pkg/backend_nexa_v2
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='storage' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='deploy_pkg' \
            --exclude='backend_nexa_archive' \
            ./ deploy_pkg/backend_nexa_v2/
          # requirements.txt en la raíz del paquete para que Oryx detecte Python
          # y construya antenv/ con todos los paquetes instalados.
          cp requirements.txt deploy_pkg/requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E84F0BB0496F4115967F1230CC306588 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DB27FC9461254FF194E5E3AE633184EF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C6D6F4F9A07846CD9BD6280315D24BB2 }}

      - name: Configure Azure Web App
        run: |
          RG=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup | [0]" -o tsv)
          echo "Resource group: $RG"

          # Habilita Oryx para instalar paquetes desde requirements.txt tras el deploy.
          # Sin esto, antenv/ no se crea y el startup falla con ModuleNotFoundError.
          az webapp config appsettings set \
            --name '${{ env.AZURE_WEBAPP_NAME }}' \
            --resource-group "$RG" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

          # Arrancar la app para que el endpoint Kudu/SCM esté disponible.
          # Sin esto, el deploy falla con 403 Site Disabled si la app estaba parada.
          az webapp start --name '${{ env.AZURE_WEBAPP_NAME }}' --resource-group "$RG"
          sleep 20

          # Limpiar wwwroot para eliminar el tarball stale de Oryx.
          # Oryx extrae output.tar.zst al arrancar sin importar si los archivos
          # en wwwroot son más recientes; un tarball de deploy anterior con código
          # viejo hace que la app arranque con ese código viejo.
          #
          # az webapp deploy --clean true es la única forma confiable de borrar
          # wwwroot con el token OIDC del workflow. Se ejecuta en background y se
          # cancela tras 45s: solo necesitamos que el servidor complete el borrado
          # (operación rápida, < 5s). El polling de arranque del CLI se cancela
          # porque no nos importa que la app arranque con el placeholder.
          printf 'placeholder' > /tmp/placeholder.txt
          zip -j /tmp/clean.zip /tmp/placeholder.txt
          az webapp deploy \
            --name '${{ env.AZURE_WEBAPP_NAME }}' \
            --resource-group "$RG" \
            --src-path /tmp/clean.zip \
            --type zip \
            --clean true \
            > /tmp/clean_log.txt 2>&1 &
          CLEAN_PID=$!
          sleep 45
          kill $CLEAN_PID 2>/dev/null
          wait $CLEAN_PID 2>/dev/null || true
          echo "=== Log de limpieza wwwroot (primeras 30 líneas) ==="
          head -30 /tmp/clean_log.txt || true

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: deploy_pkg
          # run_api.sh detecta VIRTUAL_ENV (antenv activado por Oryx), luego busca
          # antenv/ en PROJECT_ROOT, luego venv/ local. Fija PYTHONPATH y arranca
          # `python -m backend_nexa_v2.app` (módulo canónico, no nexa_engine.app).
          startup-command: bash backend_nexa_v2/run_api.sh

      - name: Diagnóstico de arranque (no bloqueante)
        # Corre siempre (if: always) para capturar el motivo de fallo incluso
        # cuando el deploy o el arranque falla. NO falla el job (exit 0).
        # Imprime: estado del sitio, respuesta /health, logs del contenedor.
        if: always()
        run: |
          set +e
          APP="${{ env.AZURE_WEBAPP_NAME }}"
          RG=$(az webapp list --query "[?name=='${APP}'].resourceGroup | [0]" -o tsv)
          HOST=$(az webapp show -n "$APP" -g "$RG" --query defaultHostName -o tsv)
          STATE=$(az webapp show -n "$APP" -g "$RG" --query state -o tsv)
          echo "Estado: $STATE  |  Hostname: $HOST"

          echo "=== /health (espera 60s: Oryx build + cold start) ==="
          sleep 60
          curl -sS -m 30 -w "\nHTTP %{http_code}\n" "https://$HOST/health" || true

          echo "=== Logs del contenedor (Oryx + uvicorn + tracebacks de arranque) ==="
          az webapp log config -n "$APP" -g "$RG" --docker-container-logging filesystem >/dev/null 2>&1
          az webapp log download -n "$APP" -g "$RG" --log-file /tmp/applogs.zip >/dev/null 2>&1
          if [ -f /tmp/applogs.zip ]; then
            mkdir -p /tmp/applogs && unzip -o -q /tmp/applogs.zip -d /tmp/applogs
            echo "--- últimas 400 líneas de docker logs ---"
            find /tmp/applogs -iname '*docker*.log' -exec cat {} + 2>/dev/null | tail -n 400
          else
            echo "(no se pudo descargar el bundle de logs; revisa Log stream en el portal)"
          fi
          exit 0

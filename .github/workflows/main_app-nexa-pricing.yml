# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - app-nexa-pricing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python version
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate imports
        run: pip install -r requirements.txt --quiet

      - name: Build deployment artifact (nested layout)
        # Layout:
        #   deploy_artifact/
        #     requirements.txt   <- Oryx detecta Python aquí
        #     startup.sh
        #     backend_nexa_v2/   <- paquete importable
        #       __init__.py, app.py, modules/, db/, ...
        run: |
          mkdir -p deploy_artifact/backend_nexa_v2
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='antenv' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='storage' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='deploy_artifact' \
            ./ deploy_artifact/backend_nexa_v2/
          cp requirements.txt deploy_artifact/
          cp startup.sh deploy_artifact/

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v6
        with:
          name: python-app
          path: deploy_artifact

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v6
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A14CF1FA3A9D48AE904FE60EF2165C04 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0FA7C3E950074591BD038FEFD8F17A95 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_412BB608E0D342FA8EBCEB4FD50D2EE9 }}

      - name: Clear Oryx build cache (force fresh source rebuild)
        # Oryx reutiliza source files del output.tar.zst anterior cuando solo cambian
        # los paquetes (requirements.txt). Al borrar el tarball y el manifiesto,
        # Oryx hace un full-rebuild desde los archivos recién desplegados en wwwroot.
        continue-on-error: true
        run: |
          RG=$(az webapp show --name app-nexa-pricing --query resourceGroup -o tsv)
          PUBL=$(az webapp deployment list-publishing-credentials \
            --name app-nexa-pricing --resource-group "$RG" \
            --query "{u:publishingUserName,p:publishingPassword}" -o json)
          KUSER=$(echo "$PUBL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['u'])")
          KPASS=$(echo "$PUBL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['p'])")
          for f in output.tar.zst oryx-manifest.toml; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -u "$KUSER:$KPASS" \
              "https://app-nexa-pricing.scm.azurewebsites.net/api/vfs/site/wwwroot/$f")
            echo "DELETE $f → HTTP $HTTP"
          done

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'app-nexa-pricing'
          slot-name: 'Production'
          startup-command: 'export PYTHONPATH="$(pwd):${PYTHONPATH:-}" && exec python -m uvicorn backend_nexa_v2.app:create_app --factory --host 0.0.0.0 --port "${PORT:-${WEBSITES_PORT:-8000}}" --workers "${WEB_CONCURRENCY:-2}" --no-access-log'

[pytest]
# ---------------------------------------------------------------------------
# WAVE 7 pytest configuration
#
# Política:
#   - Default run: suite *core* (parity + baselines + unit/integration vivos).
#   - La deuda heredada pre-V2-7 está marcada con @pytest.mark.legacy y queda
#     fuera del default run. Para ejecutarla explícitamente:
#         pytest -m legacy
#     o usando el helper:
#         scripts/run_full_tests.sh
#
# El archivo tests/test_parametrization_phase_1_2.py se excluye por
# ImportError de `nexa_engine` (módulo legacy desaparecido tras WAVE 5).
# Está documentado en docs/v27/WAVE7_TRIAGE.md.
# ---------------------------------------------------------------------------
markers =
    legacy: tests heredados pre-V2-7 (excluidos por defecto, ver docs/v27/WAVE7_TRIAGE.md)
    legacy_circular: tests pre-WAVE-17 que computan expected via la misma fórmula validada (circular). Mantenidos por histórico — no evidencian paridad real. Ver docs/v27/WAVE17_REPORT.md.
    parity: tests de paridad Excel V2-7 (criticos)
    parity_oracle_real: WAVE-17 — tests reales contra valores Excel (no circulares)
    baseline: tests de regression contra baseline certificado (criticos)
    slow: tests lentos (>1s)
    cosmos_integration: tests de integracion contra Cosmos real o emulador (requieren COSMOS_* explicito)
    certified_filesystem_deferred: certified mode vía filesystem (Layer 1 execution no completada — reemplazada por DB-backed certification). Excluida del gate de CI hasta que exista DB_BACKED_CERTIFICATION.
    cadena_c_excel_oracle_missing: Cadena C Excel parity bloqueada hasta contar con oracle Excel/V2-8 real; no regenerar snapshots desde backend.
    known_debt: tests pre-existentes excluidos del gate default — deuda documentada (ver docs/refactor/known_failures_baseline.md)

addopts = -m "not legacy and not legacy_circular and not cosmos_integration and not certified_filesystem_deferred and not cadena_c_excel_oracle_missing and not known_debt" --strict-markers --ignore=tests/test_parametrization_phase_1_2.py

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

norecursedirs = .git .claude venv .venv build dist node_modules tests/legacy_archive

testpaths = tests
